{% extends "base.html" %}
{% block content %}
<!-- Role-aware header -->
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-6">
    <h2 class="text-xl sm:text-2xl font-bold" id="dashboard-title"><i class="fa-solid fa-chart-line text-indigo-600 mr-2"></i>My Tasks</h2>
    <p class="text-gray-500 text-sm" id="current-time"></p>
</div>

<!-- Role-specific Stats Cards — hidden for designer/copywriter -->
<div id="stats-cards" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 sm:gap-4 mb-8" data-nav-perm="viewAll">
    <div class="stat-card bg-white p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-indigo-500">
        <h3 class="text-gray-500 text-xs sm:text-sm mb-1">Clients</h3>
        <p class="text-xl sm:text-3xl font-bold text-indigo-600" id="stat-clients">0</p>
    </div>
    <div class="stat-card bg-white p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-green-500">
        <h3 class="text-gray-500 text-xs sm:text-sm mb-1">Linked Accounts</h3>
        <p class="text-xl sm:text-3xl font-bold text-green-600" id="stat-accounts">0</p>
    </div>
    <div class="stat-card bg-white p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
        <h3 class="text-gray-500 text-xs sm:text-sm mb-1">Pending</h3>
        <p class="text-xl sm:text-3xl font-bold text-yellow-600" id="stat-pending">0</p>
    </div>
    <div class="stat-card bg-white p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
        <h3 class="text-gray-500 text-xs sm:text-sm mb-1">Published</h3>
        <p class="text-xl sm:text-3xl font-bold text-blue-600" id="stat-posted">0</p>
    </div>
    <div class="stat-card bg-white p-4 sm:p-6 rounded-xl shadow-sm border-l-4 border-red-500 col-span-2 sm:col-span-1">
        <h3 class="text-gray-500 text-xs sm:text-sm mb-1">Failed</h3>
        <p class="text-xl sm:text-3xl font-bold text-red-600" id="stat-failed">0</p>
    </div>
</div>

<!-- My Action Items — role-filtered, links to Calendar -->
<div class="bg-white rounded-xl shadow-sm p-4 sm:p-6 mb-6">
    <h3 class="font-bold mb-4 text-sm sm:text-base"><i class="fa-solid fa-user-check text-indigo-500 mr-2"></i>My Action Items</h3>
    <div id="my-work-items" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        <p class="text-gray-400 text-sm col-span-full text-center py-4">Loading...</p>
    </div>
</div>

<!-- Coverage Alerts -->
<div id="coverage-alerts" class="mb-6 space-y-2"></div>

<!-- Quick Actions + Recent Activity -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 sm:gap-6">
    <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6">
        <h3 class="font-bold mb-4 text-sm sm:text-base"><i class="fa-solid fa-bolt text-indigo-500 mr-2"></i>Quick Actions</h3>
        <div class="grid grid-cols-2 gap-3 quick-actions-grid">
            <a href="/calendar" class="bg-yellow-50 text-yellow-700 p-3 rounded-lg hover:bg-yellow-100 transition text-sm font-medium text-center"><i class="fa-solid fa-calendar-days mr-1"></i> Calendar</a>
            <a href="/new-post" data-nav-perm="createPost" class="bg-indigo-50 text-indigo-700 p-3 rounded-lg hover:bg-indigo-100 transition text-sm font-medium text-center"><i class="fa-solid fa-pen-to-square mr-1"></i> New Post</a>
            <a href="/pipeline" data-nav-perm="viewAll" class="bg-green-50 text-green-700 p-3 rounded-lg hover:bg-green-100 transition text-sm font-medium text-center"><i class="fa-solid fa-arrows-spin mr-1"></i> Pipeline</a>
            <a href="/tasks" data-nav-perm="createPost" class="bg-purple-50 text-purple-700 p-3 rounded-lg hover:bg-purple-100 transition text-sm font-medium text-center"><i class="fa-solid fa-clipboard-list mr-1"></i> Tasks</a>
        </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-4 sm:p-6">
        <h3 class="font-bold mb-4 text-sm sm:text-base"><i class="fa-solid fa-clock-rotate-left text-indigo-500 mr-2"></i>Activity Timeline</h3>
        <div id="activity-timeline" class="space-y-2 text-sm max-h-[400px] overflow-y-auto"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function pageInit() {
    setRoleGreeting();
    loadDashboard();
    loadMyWork();
    loadCoverageAlerts();
    loadActivityTimeline();
}

function setRoleGreeting() {
    const titleEl = document.getElementById('dashboard-title');
    if (!currentUser || !titleEl) return;
    const role = currentUser.role || 'user';
    const greetings = {
        'designer': { icon: 'fa-paintbrush', color: 'text-purple-600', label: 'Design Dashboard' },
        'motion_editor': { icon: 'fa-film', color: 'text-red-600', label: 'Motion Dashboard' },
        'copywriter': { icon: 'fa-pen-nib', color: 'text-yellow-600', label: 'Copywriting Dashboard' },
        'sm_specialist': { icon: 'fa-bullhorn', color: 'text-blue-600', label: 'Social Media Dashboard' },
        'manager': { icon: 'fa-user-tie', color: 'text-green-600', label: 'Manager Dashboard' },
        'admin': { icon: 'fa-shield-halved', color: 'text-indigo-600', label: 'Admin Dashboard' }
    };
    const g = greetings[role] || { icon: 'fa-chart-line', color: 'text-indigo-600', label: 'My Tasks' };
    titleEl.innerHTML = `<i class="fa-solid ${g.icon} ${g.color} mr-2"></i>${g.label}`;
}

async function loadDashboard() {
    if (!canDo('viewAll')) return;
    let stats;
    try { stats = await fetch(API_URL + '/stats').then(r => r.json()); } catch (e) { return; }
    document.getElementById('stat-clients').textContent = stats.total_clients;
    document.getElementById('stat-accounts').textContent = stats.total_accounts;
    document.getElementById('stat-pending').textContent = stats.pending_posts;
    document.getElementById('stat-posted').textContent = stats.posted_posts;
    document.getElementById('stat-failed').textContent = stats.failed_posts;
}

async function loadMyWork() {
    if (!currentUser) return;
    const role = currentUser.role || 'user';
    try {
        const data = await fetch(API_URL + '/posts/my-work?user_id=' + currentUser.id + '&role=' + role).then(r => r.json());
        const container = document.getElementById('my-work-items');
        if (!data || data.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-8">
                    <i class="fa-solid fa-circle-check text-4xl text-green-400 mb-3"></i>
                    <p class="text-gray-500 font-medium">All caught up!</p>
                    <p class="text-gray-400 text-sm mt-1">No pending action items right now.</p>
                </div>`;
            return;
        }
        const actionColors = {
            'needs_caption': 'bg-yellow-100 text-yellow-800',
            'needs_design': 'bg-orange-100 text-orange-800',
            'needs_review': 'bg-purple-100 text-purple-800',
            'returned_for_edits': 'bg-red-100 text-red-800',
            'ready_to_schedule': 'bg-green-100 text-green-800',
            'unassigned': 'bg-gray-100 text-gray-800',
            'overdue': 'bg-red-100 text-red-800'
        };
        container.innerHTML = data.map(item => {
            const badgeClass = actionColors[item.action] || 'bg-gray-100 text-gray-800';
            return `
            <a href="/calendar?open_post=${item.id}" class="action-item-card block hover:border-indigo-300 transition">
                <div class="flex items-center gap-2 mb-2">
                    <span class="px-2 py-0.5 rounded text-xs font-semibold badge-${item.priority || 'normal'}">${item.priority || 'normal'}</span>
                    <span class="text-xs text-gray-400">${esc(item.client_name || '')}</span>
                </div>
                <p class="font-semibold text-sm mb-1">${esc(item.topic || 'Untitled')}</p>
                <div class="flex items-center justify-between">
                    <span class="px-2 py-0.5 rounded text-xs font-semibold ${badgeClass}">${esc(item.action_label || item.action || '')}</span>
                    <span class="text-indigo-600 text-xs font-medium">Open &rarr;</span>
                </div>
            </a>`;
        }).join('');
    } catch (e) {
        document.getElementById('my-work-items').innerHTML = `
            <div class="col-span-full text-center py-8">
                <i class="fa-solid fa-circle-check text-4xl text-green-400 mb-3"></i>
                <p class="text-gray-500 font-medium">All caught up!</p>
                <p class="text-gray-400 text-sm mt-1">No pending action items right now.</p>
            </div>`;
    }
}

async function loadCoverageAlerts() {
    try {
        let overviewUrl = API_URL + '/clients/overview';
        if (currentUser) overviewUrl += `?user_id=${currentUser.id}&role=${currentUser.role || ''}`;
        const data = await fetch(overviewUrl).then(r => r.json());
        const container = document.getElementById('coverage-alerts');
        if (!data || !data.alerts || data.alerts.length === 0) { container.innerHTML = ''; return; }
        container.innerHTML = data.alerts.map(a => `
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 flex items-center gap-3">
                <i class="fa-solid fa-triangle-exclamation text-yellow-500"></i>
                <span class="text-sm text-yellow-800">${esc(a.message || a)}</span>
            </div>
        `).join('');
    } catch (e) { /* silent - new endpoint may not exist yet */ }
}

async function loadActivityTimeline() {
    const container = document.getElementById('activity-timeline');
    if (!container) return;
    try {
        const data = await fetch(API_URL + '/activity?limit=20').then(r => r.json());
        if (!data || data.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-center py-4">No recent activity</p>';
            return;
        }
        const statusLabels = {
            'draft': 'Draft', 'pending_review': 'Pending Review', 'in_design': 'In Design',
            'approved': 'Approved', 'scheduled': 'Scheduled', 'posted': 'Posted'
        };
        const statusIcons = {
            'draft': 'fa-pen text-gray-400', 'pending_review': 'fa-eye text-yellow-500',
            'in_design': 'fa-paintbrush text-orange-500', 'approved': 'fa-check text-green-500',
            'scheduled': 'fa-clock text-blue-500', 'posted': 'fa-rocket text-emerald-500'
        };
        container.innerHTML = data.map(a => {
            const icon = statusIcons[a.to_status] || 'fa-circle text-gray-400';
            const toLabel = statusLabels[a.to_status] || a.to_status;
            const fromLabel = statusLabels[a.from_status] || a.from_status || '';
            const topicPreview = getTopicPreview(a.topic, 30) || 'Untitled';
            const timeAgo = getTimeAgo(a.created_at);
            return `<div class="flex items-start gap-3 p-2 rounded-lg hover:bg-gray-50 transition">
                <div class="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0 mt-0.5">
                    <i class="fa-solid ${icon} text-xs"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <p><strong class="text-gray-700">${esc(a.user_name || 'System')}</strong> moved to <span class="font-semibold">${toLabel}</span></p>
                    <p class="text-gray-500 text-xs truncate">${esc(a.client_name || '')} &middot; ${esc(topicPreview)}${a.comment ? ' — "' + esc(a.comment) + '"' : ''}</p>
                    <p class="text-gray-400 text-[10px] mt-0.5">${timeAgo}</p>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        container.innerHTML = '<p class="text-gray-400 text-center py-4">No recent activity</p>';
    }
}

function getTimeAgo(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + (dateStr.includes('Z') ? '' : 'Z'));
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
    return d.toLocaleDateString();
}
</script>
{% endblock %}
